version: '3.8'

networks:
  korp-net:
    driver: bridge

services:
  http-server:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: http-server-projeto-korp
    networks:
      - korp-net
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    networks:
      - korp-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - http-server
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - korp-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - korp-net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
